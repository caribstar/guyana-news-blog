{{/* Newsletter Widget for Guyana Daily Brief */}}
<div class="newsletter-section">
  <div class="newsletter-container">
    <div class="newsletter-content">
      <h3>📬 Stay Ahead with Guyana's News</h3>
      <p>Get the top stories delivered daily to your inbox. Free, brief, and essential.</p>
    </div>
    <form class="newsletter-form" id="subscribe-form" netlify>
      <div class="form-group">
        <input type="email" 
               name="email"
               placeholder="Your email address" 
               required
               aria-label="Enter your email address">
        <button type="submit" class="subscribe-btn">
          <span class="btn-text">Subscribe Now</span>
          <span class="btn-icon">→</span>
        </button>
      </div>
      <p class="privacy-note">We respect your privacy. Unsubscribe anytime.</p>
    </form>
  </div>
</div>
