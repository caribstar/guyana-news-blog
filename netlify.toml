# ===================================================================
# NETLIFY CONFIG — DUST MODE
# Site is temporarily showing only the "Pardon our dust" landing page.
# To restore live site: revert this file back from netlify.toml.PRE-DUST
# ===================================================================

[build]
  publish = "dust-public"
  command = "echo 'Site in dust mode — no build needed'"

[build.environment]
  HUGO_VERSION = "0.154.3"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=300"