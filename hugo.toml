baseURL = "https://tradewindsbrief.com/"
languageCode = "en-us"
title = "The Tradewinds Brief"
theme = "PaperMod"

enableEmoji = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

ignoreLogs = ["deprecated"]

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[markup.goldmark.renderer]
  unsafe = true

[minify]
  disableXML = false
  minifyOutput = true

[params]
  env = "production"
  author = "CARIBSTAR"
  description = "Diaspora-first reporting on Guyana, the Caribbean, and Africa. Free, daily."
  defaultDescription = "Diaspora-first reporting on Guyana, the Caribbean, and Africa. Free, daily."
  images = ["/images/brand/og-default.png"]
  favicon = "/favicon.ico"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  TocOpen = false
  comments = false

[params.label]
  icon = "/images/brand/logo-horizontal.png"
  iconHeight = 72
  text = ""

[params.homeInfoParams]
  Title = "The Tradewinds Brief"
  Content = "Diaspora-first reporting on Guyana, the Caribbean, and Africa. Daily."

[params.cover]
  image = "/images/brand/og-default.png"
  alt = "The Tradewinds Brief"
  relative = false
  hidden = false

[params.assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/images/brand/favicon-16.png"
  favicon32x32 = "/images/brand/favicon-32.png"
  apple_touch_icon = "/apple-touch-icon.png"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

